;[colors]
;background = #282A2E
;background-alt = #373B41
;foreground = #C5C8C6
;primary = #F0C674
;secondary = #8ABEB7
;alert = #A54242
;disabled = #707880

[colors]
background = ${xrdb:background:#222}
background-alt = ${xrdb:color10:#222}
foreground = ${xrdb:color7:#222}
foreground-alt = ${xrdb:color7:#222}
primary = ${xrdb:color1:#222}
secondary = ${xrdb:color2:#222}
alert = ${xrdb:color3:#222}
disabled = ${xrdb:color11:#222}

[bar/example]
width = 100%
height = 2.5%
radius = 6

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3

border-size = 4
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = monospace;2

modules-left = xworkspaces xwindow
modules-center = mpd
modules-right = filesystem alsa xkeyboard memory cpu date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; tray-position = right

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.primary}
label-active-underline= ${colors.background-alt}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = #707880

[module/alsa]
type = internal/alsa
master-mixer = default
master-soundcard = default
click-left = ?
interval = 5
mapped = true

format-volume = <bar-volume> <label-volume>
label-muted =ÔÄ¶ Muted
label-muted-foreground = #689d6a
label-volume-foreground = #689d6a
bar-volume-width = 10
bar-volume-foreground-0 = #aaff77
bar-volume-foreground-1 = #aaff77
bar-volume-foreground-2 = #fba922
bar-volume-indicator-foreground = #ff
bar-volume-indicator-font = 3
bar-volume-fill = ‚ĒÄ
bar-volume-fill-font = 3
bar-volume-empty-foreground = #444444

[module/mpd]                                                                         
type = internal/mpd                                                                  
                                                                                     
format-online = <label-song> <label-time> <icon-next>                                
format-playing = ${self.format-online}                                               
format-paused = ${self.format-online}                                                
format-stopped = ${self.format-online}                                               
                                                                                     
;bar-progress-format = %{+o +u}%fill%%{-o -u}%indicator%%{+o +u}%empty%%{-u -o}      
;;label-song =  %title%                                                               
;label-song = ūüéĶ%artist% - %title%                                                    
;label-time = %elapsed% / %total%                                                     
;label-offline = ūüéĶ mpd is offline                                                    

icon-play = ‚Ė∂ÔłŹ                                                                        
icon-pause = ‚Źł                                                                       
icon-stop = ‚ŹĻ                                                                        
icon-prev = ‚Źģ                                                                        
icon-next = n                                                                        
icon-seekb = ‚Ź™                                                                      
icon-seekf = ‚Ź©                                                                      
icon-random = ūüĒÄ                                                                     
icon-repeat = ūüĒĀ                                                                     
icon-repeatone = ūüĒā                                                                  
icon-single = ūüĒā                                                                     
icon-consume = ‚úÄ                                                                     
label-song-maxlen = 25                                                               
label-song-ellipsis = true

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#F0C674}%ifname%%{F-} %essid% %local_ip%

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
